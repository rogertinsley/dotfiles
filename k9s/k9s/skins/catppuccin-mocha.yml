# Catppuccin Mocha
base: &base "#1e1e2e"
mantle: &mantle "#181825"
crust: &crust "#11111b"
text: &text "#cdd6f4"
subtext1: &subtext1 "#bac2de"
subtext0: &subtext0 "#a6adc8"
overlay2: &overlay2 "#9399b2"
overlay1: &overlay1 "#7f849c"
overlay0: &overlay0 "#6c7086"
surface2: &surface2 "#585b70"
surface1: &surface1 "#45475a"
surface0: &surface0 "#313244"
red: &red "#f38ba8"
maroon: &maroon "#eba0ac"
peach: &peach "#fab387"
yellow: &yellow "#f9e2af"
green: &green "#a6e3a1"
teal: &teal "#94e2d5"
sky: &sky "#89dceb"
sapphire: &sapphire "#74c7ec"
blue: &blue "#89b4fa"
lavender: &lavender "#b4befe"
mauve: &mauve "#cba6f7"
pink: &pink "#f5c2e7"
flamingo: &flamingo "#f2cdcd"
rosewater: &rosewater "#f5e0dc"

# Skin...
k9s:
  # General K9s styles
  body:
    fgColor: *text
    bgColor: *base
    logoColor: *mauve
  # Command prompt styles
  prompt:
    fgColor: *text
    bgColor: *base
    suggestColor: *mauve
  # ClusterInfoView styles.
  info:
    fgColor: *pink
    sectionColor: *text
  # Dialog styles.
  dialog:
    fgColor: *text
    bgColor: *base
    buttonFgColor: *crust
    buttonBgColor: *mauve
    buttonFocusFgColor: *crust
    buttonFocusBgColor: *pink
    labelFgColor: *peach
    fieldFgColor: *text
  frame:
    # Borders styles.
    border:
      fgColor: *surface1
      focusColor: *surface2
    menu:
      fgColor: *text
      keyColor: *pink
      # Used for favorite namespaces
      numKeyColor: *pink
    # CrumbView attributes for history navigation.
    crumbs:
      fgColor: *crust
      bgColor: *surface1
      activeColor: *surface2
    # Resource status and update styles
    status:
      newColor: *sky
      modifyColor: *mauve
      addColor: *green
      errorColor: *red
      highlightColor: *peach
      killColor: *overlay0
      completedColor: *overlay0
    # Border title styles.
    title:
      fgColor: *text
      bgColor: *surface0
      highlightColor: *peach
      counterColor: *mauve
      filterColor: *pink
  views:
    # Charts skins...
    charts:
      bgColor: default
      defaultDialColors:
        - *mauve
        - *red
      defaultChartColors:
        - *mauve
        - *red
    # TableView attributes.
    table:
      fgColor: *text
      bgColor: *base
      # Header row styles.
      header:
        fgColor: *text
        bgColor: *base
        sorterColor: *sky
    # Xray view attributes.
    xray:
      fgColor: *text
      bgColor: *base
      cursorColor: *surface1
      graphicColor: *mauve
      showIcons: false
    # YAML info styles.
    yaml:
      keyColor: *pink
      colonColor: *mauve
      valueColor: *text
    # Logs styles.
    logs:
      fgColor: *text
      bgColor: *base
      indicator:
        fgColor: *crust
        bgColor: *mauve
